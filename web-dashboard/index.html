<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthNet QoS Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <span class="icon">🌐</span>
                <h1>SynthNet<span class="highlight">QoS</span></h1>
            </div>
            <div class="header-info">
                <span class="status-badge live">
                    <span class="dot"></span> Live
                </span>
                <span class="time" id="lastUpdate">Loading...</span>
            </div>
        </header>

        <!-- Stats Overview -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-content">
                    <span class="stat-label">Total Flows</span>
                    <span class="stat-value" id="totalFlows">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-content">
                    <span class="stat-label">Active Traffic Types</span>
                    <span class="stat-value" id="activeTypes">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-content">
                    <span class="stat-label">Highest Priority</span>
                    <span class="stat-value" id="highestPriority">-</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔄</div>
                <div class="stat-content">
                    <span class="stat-label">Last Update</span>
                    <span class="stat-value" id="lastUpdateTime">-</span>
                </div>
            </div>
        </section>

        <!-- Priority Matrix -->
        <section class="priority-section">
            <h2>QoS Priority Matrix</h2>
            <div class="priority-grid" id="priorityGrid">
                <!-- Generated by JS -->
            </div>
        </section>

        <!-- Traffic Table -->
        <section class="traffic-section">
            <div class="section-header">
                <h2>Live Traffic</h2>
                <button class="btn-refresh" onclick="refreshData()">🔄 Refresh</button>
            </div>
            <div class="table-wrapper">
                <table id="trafficTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Profile</th>
                            <th>Host</th>
                            <th>Protocol</th>
                            <th>Bandwidth</th>
                            <th>Jitter</th>
                            <th>Loss</th>
                            <th>Priority</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="8" class="loading-text">Loading traffic data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Traffic Distribution -->
        <section class="distribution-section">
            <h2>Bandwidth Distribution</h2>
            <div class="distribution-bars" id="distributionBars">
                <!-- Generated by JS -->
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>SynthNet ML-SDN QoS Dashboard &copy; 2026</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
